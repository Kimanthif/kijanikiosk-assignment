---
- name: Configure KijaniKiosk Servers
  hosts: all
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Ensure Nginx is running
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Create a test index.html
      copy:
        dest: /var/www/html/index.html
        content: "<h1>KijaniKiosk Server - {{ inventory_hostname }}</h1>"
        owner: www-data
        group: www-data
        mode: '0644'